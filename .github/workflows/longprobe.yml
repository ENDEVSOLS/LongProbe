name: LongProbe RAG Regression Test

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        default: "3.12"
        type: string
      config-path:
        description: "Path to longprobe.yaml config file"
        required: false
        default: "longprobe.yaml"
        type: string
      goldens-path:
        description: "Path to golden questions YAML file"
        required: false
        default: "goldens.yaml"
        type: string
      fail-on-regression:
        description: "Fail the workflow when regressions are detected"
        required: false
        default: true
        type: boolean
      longprobe-version:
        description: "LongProbe package version or extras (e.g. 'chroma', 'http,chroma')"
        required: false
        default: ""
        type: string
      install-extras:
        description: "Comma-separated extras to install (e.g. 'chroma,generate')"
        required: false
        default: ""
        type: string

jobs:
  longprobe-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install LongProbe
        run: |
          if [ -n "${{ inputs.install-extras }}" ]; then
            pip install "longprobe[${{ inputs.install-extras }}]"
          else
            pip install longprobe
          fi

      - name: Verify config and goldens exist
        run: |
          if [ ! -f "${{ inputs.config-path }}" ]; then
            echo "::error file=longprobe::Config file not found: ${{ inputs.config-path }}"
            echo "Create one with: longprobe init"
            exit 1
          fi
          if [ ! -f "${{ inputs.goldens-path }}" ]; then
            echo "::error file=longprobe::Goldens file not found: ${{ inputs.goldens-path }}"
            echo "Create one with: longprobe init"
            exit 1
          fi

      - name: Run LongProbe check
        id: longprobe
        run: |
          set +e
          longprobe check \
            --config "${{ inputs.config-path }}" \
            --goldens "${{ inputs.goldens-path }}" \
            --output json \
            > longprobe-result.json 2>/dev/null
          LONGPROBE_EXIT=$?
          set -e

          # Always output GitHub annotations by re-running with --output github.
          set +e
          longprobe check \
            --config "${{ inputs.config-path }}" \
            --goldens "${{ inputs.goldens-path }}" \
            --output github
          set -e

          # Extract summary for the PR comment.
          if [ -f longprobe-result.json ] && [ -s longprobe-result.json ]; then
            echo "has-result=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-result=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$LONGPROBE_EXIT" -ne 0 ] && [ "${{ inputs.fail-on-regression }}" = "true" ]; then
            echo "::error file=longprobe::LongProbe detected regressions or failures. See PR comment for details."
            exit 1
          fi

      - name: Comment PR with results
        if: always() && steps.longprobe.outputs.has-result == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('longprobe-result.json', 'utf8'));
            } catch (e) {
              console.log('Could not parse LongProbe result JSON');
              return;
            }

            const passed = result.passed_questions || 0;
            const failed = result.failed_questions || 0;
            const total = result.total_questions || 0;
            const recall = ((result.overall_recall || 0) * 100).toFixed(1);
            const regressions = (result.diff && result.diff.regressions) || [];
            const improvements = (result.diff && result.diff.improvements) || [];
            const status = failed === 0 && regressions.length === 0 ? '✅' : '❌';

            let body = `## ${status} LongProbe RAG Regression Report\n\n`;
            body += `| Metric | Value |\n`;
            body += `|--------|-------|\n`;
            body += `| Overall Recall | **${recall}%** |\n`;
            body += `| Pass Rate | **${passed}/${total}** (${((result.pass_rate || 0) * 100).toFixed(1)}%) |\n`;
            body += `| Regressions | **${regressions.length}** |\n`;
            body += `| Improvements | **${improvements.length}** |\n`;

            if (regressions.length > 0) {
              body += `\n### ⚠️ Regressions\n`;
              for (const reg of regressions) {
                const lost = reg.newly_lost_chunks ? reg.newly_lost_chunks.join(', ') : '—';
                body += `- **${reg.question_id}**: recall dropped from ${(reg.baseline_recall * 100).toFixed(0)}% to ${(reg.current_recall * 100).toFixed(0)}% — lost: ${lost}\n`;
              }
            }

            if (improvements.length > 0) {
              body += `\n### ✨ Improvements\n`;
              for (const imp of improvements) {
                body += `- **${imp.question_id}**: recall improved from ${(imp.baseline_recall * 100).toFixed(0)}% to ${(imp.current_recall * 100).toFixed(0)}%\n`;
              }
            }

            body += `\n---\n*Config: \`${{ inputs.config-path }}\` | Goldens: \`${{ inputs.goldens-path }}\`*`;

            // Find existing comment to update, or create new.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('LongProbe RAG Regression Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
