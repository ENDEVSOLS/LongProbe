site_name: ""
site_description: Sub-second RAG regression testing for production pipelines
site_author: EnDevSols
site_url: https://endevsols.github.io/LongProbe

repo_name: ENDEVSOLS/LongProbe
repo_url: https://github.com/ENDEVSOLS/LongProbe
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: assets/longProbe-with-bg.png
  favicon: assets/longProbe.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/installation.md
      - getting-started/quick-start.md
      - getting-started/configuration.md
  - User Guide:
      - guide/golden-questions.md
      - guide/match-modes.md
      - guide/cli-reference.md
      - guide/python-api.md
      - guide/baseline-management.md
  - Integrations:
      - integrations/vector-stores.md
      - integrations/pytest.md
      - integrations/cicd.md
      - integrations/langchain.md
      - integrations/llamaindex.md
  - Demos:
      - demos/overview.md
      - demos/test-retrieval.md
      - demos/monitor-quality.md
      - demos/detect-regressions.md
  - API Reference:
      - api/core.md
      - api/adapters.md
      - api/scoring.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ENDEVSOLS
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/longprobe/
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 EnDevSols
